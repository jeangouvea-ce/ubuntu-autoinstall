autoinstall:
  version: 1
  identity:
    realname: 'Administrador'
    username: administrador
    password: '$6$4xdlAaKPLrIIdwhu$KqdfSNIJF5bk7IdSRflRe8.SxMoWBMmfGGrCGNpY.pAtbmugEpjXk2SkKjkoz0tmyR47hLAW5OoeTJMU34y4F0'
locale: pt_BR.UTF-8
  keyboard:
    layout: br
  timezone: America/Sao_Paulo

  ssh:
    install-server: true
    allow-pw: true

  packages:
    - software-properties-common
    - apt-transport-https
    - wget
    - curl
    - vim
    - htop
    - ca-certificates
    - gnupg
    - lsb-release
    - net-tools
    - git
    - libreoffice
    - openssh-server

    # Domínio / AD
    - krb5-user
    - samba
    - sssd
    - sssd-tools
    - libnss-sss
    - libpam-sss
    - ntpdate
    - realmd
    - adcli

    # Dependências do GLPI Agent
    - perl

  snaps:
    - name: spotify
      channel: stable
      classic: false
    - name: discord
      channel: stable
      classic: false
  codecs:
    install: true

  drivers:
    install: true

  updates: all

late-commands:
    - |
      cat > /target/root/clinica-experts-postinstall.sh <<'EOF'
      #!/usr/bin/env bash
      set -euo pipefail

      export DEBIAN_FRONTEND=noninteractive

      echo "[1/9] Atualizando pacotes base..."
      apt-get update
      apt-get install -y \
        software-properties-common apt-transport-https \
        wget curl vim htop ca-certificates gnupg lsb-release net-tools git \
        perl libreoffice openssh-server \
        krb5-user samba sssd sssd-tools libnss-sss libpam-sss ntpdate realmd adcli

      echo "[2/9] Ingressando no domínio..."

      # Preencha estes valores antes de usar em produção.
      # Se DOMINIO, USUARIO_DOMINIO ou SENHA_DOMINIO ficarem vazios/placeholder,
      # esta etapa será ignorada para evitar falha no autoinstall.
      DOMINIO="SEU_DOMINIO_AQUI"
      USUARIO_DOMINIO="SEU_USUARIO_AQUI"
      SENHA_DOMINIO="SUA_SENHA_AQUI"

      if [ "$DOMINIO" != "SEU_DOMINIO_AQUI" ] && \
         [ "$USUARIO_DOMINIO" != "SEU_USUARIO_AQUI" ] && \
         [ "$SENHA_DOMINIO" != "SUA_SENHA_AQUI" ]; then
        ntpdate pool.ntp.org || true
        realm discover "$DOMINIO"
        echo "$SENHA_DOMINIO" | realm join --user="$USUARIO_DOMINIO" "$DOMINIO"

        if [ -f /etc/sssd/sssd.conf ]; then
          sed -i 's/use_fully_qualified_names = True/use_fully_qualified_names = False/' /etc/sssd/sssd.conf
          chmod 600 /etc/sssd/sssd.conf
        fi

        systemctl enable sssd || true
      else
        echo "Domínio não configurado. Pulando ingresso no domínio."
      fi

      echo "[3/9] Configurando GLPI Agent..."
      cd /tmp
      wget -O glpi-agent.pl https://github.com/glpi-project/glpi-agent/releases/download/1.16/glpi-agent-1.16-linux-installer.pl
      chmod +x glpi-agent.pl
      perl glpi-agent.pl -s https://glpi.clinicaexperts.com.br/front/inventory.php

      systemctl enable glpi-agent || true

      echo "[4/9] Instalando Docker..."
      install -m 0755 -d /etc/apt/keyrings

      curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
      chmod a+r /etc/apt/keyrings/docker.asc

      . /etc/os-release

      echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu ${VERSION_CODENAME} stable" \
        > /etc/apt/sources.list.d/docker.list

      apt-get update
      apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

      systemctl enable docker || true

      echo "[5/9] Instalando Google Chrome..."
      wget -q -O - https://dl.google.com/linux/linux_signing_key.pub \
        | gpg --dearmor -o /etc/apt/keyrings/google-chrome.gpg

      echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" \
        > /etc/apt/sources.list.d/google-chrome.list

      apt-get update
      apt-get install -y google-chrome-stable

      echo "[6/9] Instalando VSCode..."
      wget -qO- https://packages.microsoft.com/keys/microsoft.asc \
        | gpg --dearmor -o /etc/apt/keyrings/ms.gpg

      echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/ms.gpg] https://packages.microsoft.com/repos/code stable main" \
        > /etc/apt/sources.list.d/vscode.list

      apt-get update
      apt-get install -y code

      echo "[7/9] Instalando Slack..."
      cd /tmp
      wget -O slack.deb "https://downloads.slack-edge.com/desktop-releases/linux/x64/4.47.69/slack-desktop-4.47.69-amd64.deb"
      apt-get install -y ./slack.deb

      echo "[8/9] Confirmando LibreOffice..."
      apt-get install -y libreoffice

      echo "[9/9] Setup finalizado com sucesso."
      EOF

    - chmod +x /target/root/clinica-experts-postinstall.sh
    - curtin in-target --target=/target -- bash /root/clinica-experts-postinstall.sh

  shutdown: reboot
